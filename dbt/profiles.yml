# dbt Profile Configuration for Talastock Data Platform
# This file tells dbt how to connect to your PostgreSQL warehouse

talastock:
  target: dev
  outputs:
    # Local development — run dbt directly on your machine
    dev:
      type: postgres
      host: localhost
      port: 5433
      user: warehouse_user
      password: warehouse_pass
      dbname: talastock_warehouse
      schema: analytics
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: analytics,staging,raw,public

    # Docker / Airflow — dbt runs inside the Airflow container
    # The warehouse is reachable via Docker network hostname
    docker:
      type: postgres
      host: talastock-warehouse
      port: 5432
      user: warehouse_user
      password: warehouse_pass
      dbname: talastock_warehouse
      schema: analytics
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: analytics,staging,raw,public

    prod:
      type: postgres
      host: talastock-warehouse
      port: 5432
      user: warehouse_user
      password: warehouse_pass
      dbname: talastock_warehouse
      schema: analytics
      threads: 8
      keepalives_idle: 0
      connect_timeout: 10
      search_path: analytics,staging,raw,public

# Notes:
# - dev    → use when running dbt locally (port 5433, localhost)
# - docker → use when running dbt inside Airflow container (port 5432, Docker hostname)
# - prod   → use for production runs
